query GetUsers {
  users {
    id
    firstName
    lastName
    # email
    login
    role
    createdAt
    updatedAt
  }
}

query GetChatUsers {
  getChatUsers {
    id
    firstName
    lastName
    login
    # email
    role
  }
}

query GetUser($id: ID!) {
  user(id: $id) {
    id
    firstName
    lastName
    login
    # email
    role
  }
}

mutation DeleteUser($id: ID!) {
  deleteUser(id: $id)
}

mutation UpdateUser($id: ID!, $input: UpdateUserInput!) {
  updateUser(id: $id, input: $input) {
    id
    firstName
    lastName
    role
    updatedAt
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(input: $input) {
    id
    firstName
    lastName
    role
    createdAt
    updatedAt
  }
}
