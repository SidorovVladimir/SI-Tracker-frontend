query getMe {
  me {
    id
    firstName
    lastName
    login
    role
  }
}

mutation Login($input: LoginUserInput!) {
  login(input: $input) {
    success
    user {
      id
      firstName
      lastName
      login
      role
    }
  }
}

mutation Register($input: CreateUserInput!) {
  register(input: $input) {
    success
    user {
      id
      firstName
      lastName
      login
      role
    }
  }
}

mutation Logout {
  logout
}
