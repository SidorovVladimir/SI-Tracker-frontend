query GetFinancialAnalytics($year: Int!, $month: Int) {
  getFinancialAnalytics(year: $year, month: $month) {
    totalSpent
    monthlyTimeline {
      month
      amount
    }
    byCities {
      cityName
      amount
    }
    byCompanies {
      companyName
      amount
    }
    byProductionSites {
      siteId
      fullSiteLabel
      amount
    }
  }
}

query GetAdminDashboardStats {
  getAdminDashboardStats {
    stats {
      devices
      users
      companies
      sites
      standards
      tariffs
    }
    anomalies {
      missingMpi {
        id
        name
        model
        serialNumber
      }
      missingControlType {
        id
        name
        model
        serialNumber
      }
      missingHistory {
        id
        name
        model
        serialNumber
      }
      statusMismatch {
        id
        name
        model
        serialNumber
      }
    }
  }
}
