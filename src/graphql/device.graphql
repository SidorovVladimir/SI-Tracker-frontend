mutation CreateDevice($input: CreateDeviceInput!) {
  createDevice(input: $input) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    statusId
    productionSiteId
    equipmentTypeId
    measurementTypeId
    createdAt
    updatedAt
  }
}

query GetDevicesList {
  devices {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    statusId
    productionSiteId
    equipmentTypeId
    measurementTypeId
    createdAt
    updatedAt
  }
}

query GetDevicesWithRelationsList {
  devicesWithRelations {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    status {
      name
    }
    productionSite {
      name
      city {
        name
      }
      company {
        name
      }
    }
    verifications {
      id
      date
      validUntil
      result
      protocolNumber
      organization
      comment
      documentUrl
      metrologyControleType {
        name
      }
    }
    scopes {
      name
    }
  }
}

query GetDeviceWithRelation($id: ID!) {
  device(id: $id) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    equipmentType {
      id
      name
    }
    measurementType {
      id
      name
    }
    status {
      id
      name
    }
    productionSite {
      id
      name
      city {
        id
        name
      }
      company {
        id
        name
      }
    }
    verifications {
      id
      date
      validUntil
      result
      protocolNumber
      organization
      comment
      deviceId
      documentUrl
      metrologyControleType {
        id
        name
      }
    }
    scopes {
      id
      name
    }
  }
}

mutation DeleteDevice($id: ID!) {
  deleteDevice(id: $id)
}

mutation UpdateDevice($id: ID!, $input: UpdateDeviceInput!) {
  updateDevice(id: $id, input: $input) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    statusId
    productionSiteId
    equipmentTypeId
    measurementTypeId
    createdAt
    updatedAt
  }
}
