query GetDevicesWithRelationsList(
  $limit: Int!
  $offset: Int!
  $filter: DeviceFilterInput
) {
  devicesWithRelations(limit: $limit, offset: $offset, filter: $filter) {
    items {
      id
      name
      model
      serialNumber
      releaseDate
      grsiNumber
      # measurementRange
      # accuracy
      inventoryNumber
      receiptDate
      manufacturer
      # verificationInterval
      archived
      # nomenclature
      # comment
      status {
        name
      }
      productionSite {
        name
        city {
          name
        }
        company {
          name
        }
      }
      # verifications {
      #  id
      #  date
      #  validUntil
      #  result
      # protocolNumber
      # organization
      # comment
      # documentUrl
      # metrologyControleType {
      #   name
      # }
      # verificationOrganization {
      #   name
      # }
      #}
      latestVerification {
        id
        date
        validUntil
        protocolNumber
        metrologyControleType {
          name
        }
      }
      # scopes {
      #   name
      #  }
      #  primaryStandarts {
      #    name
      #  }
      # measurementTypes {
      #   name
      #  }
    }
    # 2. Запрашиваем общее количество записей с учетом фильтров для пагинатора
    totalCount
  }
}

query GetDeviceWithRelation($id: ID!) {
  device(id: $id) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    csmCode
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    comment
    equipmentType {
      id
      name
    }
    status {
      id
      name
    }
    productionSite {
      id
      name
      city {
        id
        name
      }
      company {
        id
        name
      }
    }
    verifications {
      id
      date
      validUntil
      result
      protocolNumber
      organization
      comment
      deviceId
      documentUrl
      cost
      metrologyControleType {
        id
        name
      }
      verificationOrganization {
        id
        name
      }
    }
    scopes {
      id
      name
    }
    primaryStandarts {
      id
      name
    }
    measurementTypes {
      id
      name
    }
  }
}

mutation DeleteDevice($id: ID!) {
  deleteDevice(id: $id)
}

mutation UpdateDevice($id: ID!, $input: UpdateDeviceInput!) {
  updateDevice(id: $id, input: $input) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    csmCode
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    comment
    statusId
    productionSiteId
    equipmentTypeId
    createdAt
    updatedAt
  }
}

mutation CreateVerification($input: CreateVerificationInput!) {
  createVerification(input: $input) {
    id
    deviceId
    protocolNumber
    result
    date
    validUntil
    cost
    metrologyControleTypeId
    verificationOrganizationId
    comment
  }
}

