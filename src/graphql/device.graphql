mutation CreateDevice($input: CreateDeviceInput!) {
  createDevice(input: $input) {
    id
    name
    model
    serialNumber
    releaseDate
    grsiNumber
    measurementRange
    accuracy
    csmCode
    inventoryNumber
    receiptDate
    manufacturer
    verificationInterval
    archived
    nomenclature
    comment
    statusId
    productionSiteId
    equipmentTypeId
    createdAt
    updatedAt
  }
}

