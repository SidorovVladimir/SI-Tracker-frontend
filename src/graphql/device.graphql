mutation ImportDevicesFromExcel($input: [ImportDeviceItemInput!]!) {
  importDevicesFromExcel(input: $input) {
    jobId # ID задачи для GlobalJobWatcher
    itemCount # Сколько приборов в файле всего
    message # Текст сообщения сервера
  }
}

query ExecuteRawSql($sqlQuery: String!) {
  executeRawSql(sqlQuery: $sqlQuery) {
    success
    columns
    rows
    affectedRows
    errorMessage
  }
}

query GetDevicesBarcodeData($ids: [ID!]!) {
  getDevicesBarcodeData(ids: $ids) {
    id
    name
    model
    serialNumber
    statusName
    controlType
    validUntil
  }
}
