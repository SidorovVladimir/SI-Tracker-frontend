mutation SyncBatchWithArshin($batchId: ID!) {
  syncBatchWithArshin(batchId: $batchId) {
    jobId # ID задачи из BullMQ, который мы передадим в прогресс-бар
    batchId # ID партии приборов
    message # Текст "Синхронизация запущена в фоновом режиме"
  }
}

query FetchArshinVerifications($input: FetchArshinVerificationsInput!) {
  fetchArshinVerifications(input: $input) {
    arshinId
    protocolNumber
    date
    validUntil
    isApplicable
    organizationName
    documentUrl
  }
}

query FindArshinDocumentUrl($protocolNumber: String!) {
  findArshinDocumentUrl(protocolNumber: $protocolNumber)
}
