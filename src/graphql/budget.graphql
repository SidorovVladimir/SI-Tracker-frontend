query GetBudgetMatrix(
  $targetYear: Int!
  $groupBy: BudgetGroupBy!
  $companyId: ID
  $cityId: ID
  $siteId: ID
) {
  getBudgetMatrix(
    targetYear: $targetYear
    groupBy: $groupBy
    companyId: $companyId
    cityId: $cityId
    siteId: $siteId
  ) {
    targetYear
    grandTotal
    rows {
      rowId
      rowName
      totalYearCost
      months {
        month
        totalCost
      }
    }
  }
}

query GetBudgetPlans {
  budgetPlans {
    id
    year
    status
    comment
    createdAt
  }
}

# 2. Получить конкретный план по ID
query GetBudgetPlan($id: ID!) {
  budgetPlan(id: $id) {
    id
    year
    status
    comment
  }
}

# 3. Получить строки бюджета с пагинацией, фильтрами и вложенным прибором
query GetBudgetPlanItems(
  $budgetId: ID!
  $limit: Int!
  $offset: Int!
  $filter: BudgetPlanFilterInput
) {
  budgetPlanItems(
    budgetId: $budgetId
    limit: $limit
    offset: $offset
    filter: $filter
  ) {
    items {
      id
      deviceName
      deviceModel
      matchMethod
      basePrice
      vatAmount
      totalCost
      device {
        id
        serialNumber
        grsiNumber
      }
    }
    totalCount
    totalCostAll # 🎯 ДОБАВЛЕНО: Забираем общую сумму отфильтрованного города/компании со всей базы!
  }
}

query GetBudgetPlanDetails(
  $budgetId: ID!
  $limit: Int!
  $offset: Int!
  $filter: BudgetPlanFilterInput
) {
  # 1. Запрос метаданных самого плана (из него берем статус и год)
  budgetPlan(id: $budgetId) {
    id
    year
    status
    comment
  }

  # 2. Запрос отфильтрованных строк приборов для таблицы/карточек
  budgetPlanItems(
    budgetId: $budgetId
    limit: $limit
    offset: $offset
    filter: $filter
  ) {
    items {
      id
      deviceName
      deviceModel
      matchMethod
      basePrice
      vatAmount
      totalCost
      device {
        id
        serialNumber
        grsiNumber
      }
    }
    totalCount
    totalCostAll
  }
}

# 4. Получить список всех загруженных прейскурантов ЦСМ с вложенной организацией
query GetPricelists {
  pricelists {
    id
    verificationOrganizationId
    title
    year
    isRegulated
    createdAt
    # Запрашиваем связанную организацию (собрана бэкендом через with.verificationOrganization)
    verificationOrganization {
      id
      name
    }
  }
}

# 5. Получить один прейскурант по ID
query GetPricelist($id: ID!) {
  pricelist(id: $id) {
    id
    title
    year
    isRegulated
  }
}

# --- МУТАЦИИ (MUTATIONS) ---

# 1. Запустить каскадный расчет годового бюджета
mutation CreateBudgetPlan($input: CreateBudgetPlanInput!) {
  createBudgetPlan(input: $input) {
    id
    year
    status
    comment
    createdAt
    updatedAt
  }
}

# 2. Обновить плановую цену прибора вручную (Inline-редактирование)
mutation UpdateBudgetPlanItemPrice($input: UpdateBudgetPlanItemPriceInput!) {
  updateBudgetPlanItemPrice(input: $input) {
    id
    basePrice
    vatAmount
    totalCost
    matchMethod
  }
}

# 3. Утвердить и заморозить бюджет на год
mutation ApproveBudgetPlan($id: ID!) {
  approveBudgetPlan(id: $id) {
    id
    status
  }
}

# 4. Удалить план бюджета
mutation DeleteBudgetPlan($id: ID!) {
  deleteBudgetPlan(id: $id)
}

mutation CreatePricelist($input: CreatePricelistInput!) {
  createPricelist(input: $input) {
    jobId
    itemCount
    message
  }
}

# 6. Удалить прейскурант ЦСМ
mutation DeletePricelist($id: ID!) {
  deletePricelist(id: $id)
}

query GetBudgetPlanDistribution($budgetId: ID!, $groupBy: String!) {
  getBudgetPlanDistribution(budgetId: $budgetId, groupBy: $groupBy) {
    groupId # 🎯 Забираем UUID из базы
    groupName
    count
    baseSubtotal
    totalCost
  }
}

query GetCsmTariffTrend($siteId: String!) {
  getCsmTariffTrend(siteId: $siteId) {
    serviceName
    timeline {
      year
      price
      csmName
    }
  }
}

query GetVerificationRisks {
  getVerificationRisks {
    cities {
      id
      name
      status
      totalCount
      expiredCount
      warningCount
      companies {
        id
        name
        status
        totalCount
        expiredCount
        warningCount
        sites {
          id
          name
          status
          totalCount
          expiredCount
          warningCount
        }
      }
    }
  }
}
